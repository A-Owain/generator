<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Instant Signature Generator</title>
<link rel="icon" type="image/x-icon" href="/images/darkemb.png">

<style>
body{font-family:'PingAR', Arial, sans-serif;background:#f5f5f5;margin:0;padding:30px}
.wrap{
  max-width:850px;margin:auto;display:flex;flex-direction:column;gap:30px;
}
.card{background:white;padding:20px;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
input{width:100%;padding:10px;margin-top:6px;margin-bottom:12px;border-radius:6px;border:1px solid #ddd}
button{padding:10px 14px;border-radius:6px;border:1px solid #ddd;background:white;cursor:pointer}
.primary{background:#0a66c2;color:white;border:none}

.sig{display:flex;gap:14px;align-items:center;padding:6px;border:1px solid #02326d;border-radius:6px;width:600px;}
.avatar{width:150px;height:150px;border-radius:6px;object-fit:cover;background:#eee}
.initials{width:150px;height:150px;border-radius:6px;background:#02326d;color:white;display:flex;align-items:center;justify-content:center;font-weight:700}

.name{font-weight:700;font-size:17px;color:#02326d;}
.name{
  font-family:'PingAR', Arial, sans-serif;
  font-weight:900;
}
.title{color:#02326d;font-size:13px}
.title{
  font-family:'PingAR', Arial, sans-serif;
  font-weight:500;
}
.links{font-size:13px;margin-top:45px;color:#02326d}
.links a{color:#02326d;text-decoration:none;margin-right:10px}
.links a{display:inline}
.links{
  font-family:'PingAR', Arial, sans-serif;
  font-weight:500;
}

.avatar-choices{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.avatar-choice{
  display:flex;
  align-items:center;
  gap:8px;
  border:1px solid #ddd;
  border-radius:6px;
  padding:6px 8px;
  cursor:pointer;
  user-select:none;
}

.avatar-choice input{
  width:auto;
  margin:0;
}

.avatar-thumb{
  width:42px;
  height:42px;
  border-radius:6px;
  object-fit:cover;
  display:block;
  border:1px solid #eee;
}

@font-face{
  font-family:'PingAR';
  src:url('./fonts/PingAR+LT-Heavy.otf') format('opentype');
  font-weight:900;
}

@font-face{
  font-family:'PingAR';
  src:url('./fonts/PingAR-LT-Medium.otf') format('opentype');
  font-weight:500;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h3>Generator</h3>

<label>Name</label>
<input id="name">

<label>Title</label>
<input id="title">

<label>Email</label>
<input id="email">

<label>Phone</label>
<input id="phone">

<label>Website</label>
<input id="web" value="https://www.alraedah.sa/">

<label>Upload Avatar</label>
<input type="file" id="avatarUpload" accept="image/*">

<label>Choose a default avatar</label>

<div class="avatar-choices" id="avatarChoices"></div>

<br><br>

<button class="primary" onclick="copyHTML()">Copy HTML</button>
<button onclick="copyText()">Copy Text</button>
<button onclick="downloadPNG()">Download PNG</button>

</div>


<div class="card">
<h3>Preview</h3>

<div id="sig" class="sig">

<img id="avatar" class="avatar" style="display:none">

<div id="initials" class="initials">AA</div>

<div>
<div id="pname" class="name">Your Name</div>
<div id="ptitle" class="title">Your Title</div>
<div id="plinks" class="links"></div>
</div>

</div>

</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>

<script>

const $ = id=>document.getElementById(id)

function initials(n){
let p=n.trim().split(" ")
if(!p[0]) return "AA"
return (p[0][0]+(p[1]?p[1][0]:"")).toUpperCase()
}

function update(){

$("pname").textContent=$("name").value||"Your Name"
$("ptitle").textContent=$("title").value||"Your Title"

$("initials").textContent=initials($("name").value||"AA")

let links=[]
if($("email").value)links.push(`<a>${$("email").value}</a>`)
if($("phone").value)links.push(`<a>${$("phone").value}</a>`)
if($("web").value)links.push(`<a>${$("web").value}</a>`)

$("plinks").innerHTML = links.join("<br>")

}

["name","title","phone","email","web"].forEach(id=>{
$(id).oninput=update
})

update()

/* -------- avatar upload + resize ---------- */

$("avatarUpload").onchange=e=>{

let file=e.target.files[0]
if(!file) return

let img=new Image()
let reader=new FileReader()

reader.onload=ev=>{
img.src=ev.target.result
}

img.onload=()=>{

let canvas=document.createElement("canvas")
let max=256
let scale=Math.min(max/img.width,max/img.height,1)

canvas.width=img.width*scale
canvas.height=img.height*scale

canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height)

let data=canvas.toDataURL("image/jpeg",0.85)

$("avatar").src=data
$("avatar").style.display="block"
$("initials").style.display="none"

}

reader.readAsDataURL(file)

}

/* -------- copy HTML ---------- */

async function copyHTML(){
  const html = buildEmailSafeSignatureHTML();

  const plain = [
    $("name").value,
    $("title").value,
    $("email").value,
    $("phone").value,
    $("web").value
  ].filter(Boolean).join(" | ") || "Signature";

  await navigator.clipboard.write([
    new ClipboardItem({
      "text/html": new Blob([html], { type: "text/html" }),
      "text/plain": new Blob([plain], { type: "text/plain" })
    })
  ]);

  alert("Copied (Calibri 12pt email-safe).");
}

/* -------- copy TEXT ---------- */

function copyText(){

let t=[
$("name").value,
$("title").value,
$("phone").value,
$("email").value,
$("web").value
].filter(Boolean).join(" | ")

navigator.clipboard.writeText(t)

alert("Text copied")

}

/* -------- PNG ---------- */

async function downloadPNG(){
  try{
    if (document.fonts) await document.fonts.ready;

    const node = $("sig");
    const rect = node.getBoundingClientRect();

    // Ensure avatar is fully loaded if visible
    if ($("avatar").style.display !== "none" && $("avatar").src){
      try { await $("avatar").decode(); } catch {}
    }

    const targetWidth = 3840;              // 4K width
    let scale = targetWidth / rect.width;  // scale up to 4K
    scale = Math.min(scale, 6);            // safety cap to avoid crashes

    const canvas = await html2canvas(node, {
      backgroundColor: "#ffffff",
      scale: scale,
      useCORS: true,
      allowTaint: true
    });

    const data = canvas.toDataURL("image/png");

    const a = document.createElement("a");
    a.href = data;
    a.download = "signature-4k.png";
    document.body.appendChild(a);
    a.click();
    a.remove();

  } catch(err){
    console.error("PNG export failed:", err);
    alert("PNG export failed. Check Console for details.");
  }
}

/* -------- extra -------- */

function buildEmailSafeSignatureHTML(){
  const name  = ($("name").value  || "Your Name").trim();
  const title = ($("title").value || "Your Title").trim();
  const email = ($("email").value || "").trim();
  const phone = ($("phone").value || "").trim();
  const web   = ($("web").value   || "").trim();

  // Use the currently-visible avatar (upload or preset)
  const avatarSrc = ($("avatar").style.display !== "none" && $("avatar").src) ? $("avatar").src : "";
  const initialsText = initials(name || "AA");

  // REQUIRED by you
  const FONT_FAMILY = "Calibri, Arial, sans-serif";
  const BASE_SIZE   = "12pt";
  const LINE_HEIGHT = "16pt";

  // Your preview colors
  const COLOR  = "#02326d";
  const BORDER = `1px solid ${COLOR}`;
  const RADIUS = "6px";

  const esc = (s) => (s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");

  const safeUrl = (u) => {
    if(!u) return "";
    if(/^https?:\/\//i.test(u)) return u;
    return "https://" + u;
  };

  const row = (html) => `
    <tr>
      <td style="padding:0;margin:0;font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};">
        ${html}
      </td>
    </tr>`.trim();

  const contactRows = [];
  if (email) contactRows.push(row(`<a href="mailto:${esc(email)}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(email)}</a>`));
  if (phone) contactRows.push(row(`<a href="tel:${esc(phone.replace(/\s+/g,""))}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(phone)}</a>`));
  if (web)   contactRows.push(row(`<a href="${esc(safeUrl(web))}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(web)}</a>`));

  // Avatar: prefer embedded/base64 (best for email). If it’s not base64, it may still paste, but some clients block.
  const avatarBlock = avatarSrc
    ? `<img src="${esc(avatarSrc)}" width="150" height="150" alt="avatar"
         style="display:block;width:150px;height:150px;border-radius:${RADIUS};object-fit:cover;border:0;outline:none;text-decoration:none;">`
    : `<div style="width:150px;height:150px;border-radius:${RADIUS};background:${COLOR};color:#ffffff;
                  font-family:${FONT_FAMILY};font-size:20pt;line-height:150px;text-align:center;font-weight:700;">
         ${esc(initialsText)}
       </div>`;

  // NOTE: margin-top is unreliable in email. Use a spacer row for your 45px gap.
  // We’ll approximate your preview with a fixed spacer (e.g., 24px). You can change SPACER_PX to 45, but some clients compress it.
  const SPACER_PX = 24;

  return `
<table role="presentation" cellpadding="0" cellspacing="0" border="0"
  style="border-collapse:separate;border-spacing:0;border:${BORDER};border-radius:${RADIUS};
         font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};">
  <tr>
    <td style="padding:6px;">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
        <tr>
          <td valign="top" style="padding:0;margin:0;">
            ${avatarBlock}
          </td>
          <td width="14" style="width:14px;font-size:0;line-height:0;">&nbsp;</td>
          <td valign="top" style="padding:0;margin:0;font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};">
            <div style="font-family:${FONT_FAMILY};font-size:14pt;line-height:18pt;font-weight:700;color:${COLOR};">
              ${esc(name)}
            </div>
            <div style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};font-weight:400;color:${COLOR};">
              ${esc(title)}
            </div>

            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <tr><td style="height:${SPACER_PX}px;line-height:${SPACER_PX}px;font-size:0;">&nbsp;</td></tr>
            </table>

            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              ${contactRows.join("")}
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>`.trim();
}

/*------*/

// ===== Default avatars (edit filenames to match yours) =====
const DEFAULT_AVATARS = [
  "./images/darkemb.png",
  "./images/darkfull.png",
  "./images/lightemb.png",
  "./images/lightfull.png"
];

// Convert an image URL to base64 data URL (so copy/paste email works)
async function urlToDataURL(url){
  const res = await fetch(url, { cache: "no-store" });
  const blob = await res.blob();
  return await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

function applyAvatarDataUrl(dataUrl){
  $("avatar").src = dataUrl;
  $("avatar").style.display = "block";
  $("initials").style.display = "none";

  document.querySelectorAll('input[name="presetAvatar"]').forEach(r => r.checked = false);
}

// Reset to initials
function resetAvatar(){
  $("avatar").src = "";
  $("avatar").style.display = "none";
  $("initials").style.display = "flex";
  // also uncheck radios
  document.querySelectorAll('input[name="presetAvatar"]').forEach(r => r.checked = false);
}

// Render radio choices
async function initDefaultAvatars(){
  const wrap = $("avatarChoices");
  wrap.innerHTML = "";

  // Preload + convert to data URLs once (fast after first load)
  const dataUrls = await Promise.all(DEFAULT_AVATARS.map(urlToDataURL));

  dataUrls.forEach((dataUrl, idx) => {
    const id = `preset_${idx}`;

    const label = document.createElement("label");
    label.className = "avatar-choice";
    label.setAttribute("for", id);

    label.innerHTML = `
      <input type="radio" name="presetAvatar" id="${id}">
      <img class="avatar-thumb" src="${dataUrl}" alt="avatar ${idx+1}">
      <span>Avatar ${idx+1}</span>
    `;

    // When selected, apply avatar
    label.querySelector("input").addEventListener("change", () => {
      applyAvatarDataUrl(dataUrl);
    });

    wrap.appendChild(label);
  });
}

// Call this once on page load
initDefaultAvatars().catch(console.error);

/*----*/

</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
