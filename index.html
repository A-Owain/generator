<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Instant Signature Generator</title>
<link rel="icon" type="image/x-icon" href="./images/darkemb.png">

<style>
body{font-family:'PingAR', Arial, sans-serif;background:#f5f5f5;margin:0;padding:30px}
.wrap{max-width:850px;margin:auto;display:flex;flex-direction:column;gap:30px;}
.card{background:white;padding:20px;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
input{width:100%;padding:10px;margin-top:6px;margin-bottom:12px;border-radius:6px;border:1px solid #ddd}
button{padding:10px 14px;border-radius:6px;border:1px solid #ddd;background:white;cursor:pointer}
.primary{background:#0a66c2;color:white;border:none}

.langbar{display:flex;gap:10px;margin-bottom:12px;}
.langbar button{padding:8px 12px;border-radius:6px;border:1px solid #ddd;background:#fff}
.langbar .primary{border:none}

/* ✅ Use GRID instead of FLEX to guarantee column placement */
.sig{
  display:grid;
  grid-template-columns:150px 1fr; /* EN: avatar left */
  gap:14px;
  align-items:center;
  padding:6px;
  border:1px solid #02326d;
  border-radius:6px;
  width:600px;
}

#sigAR{
  grid-template-columns:1fr 150px; /* AR: avatar right */
  text-align:right;
}

.avatarwrap{
  width:150px;height:150px;
  display:flex;align-items:center;justify-content:center;
}
.avatar{width:150px;height:150px;border-radius:6px;object-fit:cover;background:#eee;display:block}
.initials{width:150px;height:150px;border-radius:6px;background:#02326d;color:white;display:flex;align-items:center;justify-content:center;font-weight:700}

.textwrap{min-width:0;}
#sigAR .textwrap{direction:rtl;text-align:right;}

.name{font-size:17px;color:#02326d;font-family:'PingAR', Arial, sans-serif;font-weight:900;}
.title{color:#02326d;font-size:13px;font-family:'PingAR', Arial, sans-serif;font-weight:500;}
.links{font-size:13px;margin-top:45px;color:#02326d;font-family:'PingAR', Arial, sans-serif;font-weight:500;}
.links a{color:#02326d;text-decoration:none;display:inline;overflow-wrap:anywhere}
#sigAR .links{text-align:right;}

.avatar-choices{display:flex;gap:10px;flex-wrap:wrap;}
.avatar-choice{display:flex;align-items:center;gap:8px;border:1px solid #ddd;border-radius:6px;padding:6px 8px;cursor:pointer;user-select:none;}
.avatar-choice input{width:auto;margin:0;}
.avatar-thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;display:block;border:1px solid #eee;}

/* ---------- Cropper UI ---------- */
.cropModal{
  position:fixed; inset:0;
  background:rgba(0,0,0,.55);
  display:none;
  align-items:center; justify-content:center;
  padding:18px;
  z-index:9999;
}
.cropBox{
  background:#fff;
  width:min(920px, 96vw);
  border-radius:10px;
  box-shadow:0 12px 30px rgba(0,0,0,.25);
  padding:14px;
}
.cropTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.cropTop h4{margin:0;font-size:16px;color:#02326d}
.cropStage{
  background:#f5f5f5;
  border:1px solid #ddd;
  border-radius:10px;
  height:min(520px, 62vh);
  width:min(520px, 62vh);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  position:relative;
}
.cropCanvas{
  width:100%;
  height:100%;
  display:block;
}
.cropTools{
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  margin-top:12px;
}
.cropTools label{font-size:13px;color:#02326d}
.cropTools input[type="range"]{width:220px}
.cropHint{font-size:12px;color:#666;margin-top:6px}
.cropBtns{display:flex; gap:10px; justify-content:flex-end; margin-top:12px;}

@font-face{
  font-family:'PingAR';
  src:url('./fonts/PingAR+LT-Heavy.otf') format('opentype');
  font-weight:900;
}
@font-face{
  font-family:'PingAR';
  src:url('./fonts/PingAR-LT-Medium.otf') format('opentype');
  font-weight:500;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h3>Generator</h3>

    <label>Name</label>
    <input id="name">

    <label>Title</label>
    <input id="title">

    <label>Email</label>
    <input id="email">

    <label>Phone</label>
    <input id="phone">

    <label>Website</label>
    <input id="web" value="https://www.alraedah.sa">

    <label>Upload Avatar (with crop)</label>
    <input type="file" id="avatarUpload" accept="image/*">

    <label>Choose a default avatar</label>
    <div class="avatar-choices" id="avatarChoices"></div>

    <div style="margin-top:10px;">
      <button type="button" onclick="resetAvatar()">Use Initials</button>
    </div>

    <br>

    <button class="primary" onclick="copyHTML()">Copy HTML</button>
    <button onclick="copyText()">Copy Text</button>
    <button onclick="downloadPNG()">Download PNG</button>
  </div>

  <div class="card">
    <h3>Preview</h3>

    <div class="langbar">
      <button type="button" id="btnEN" class="primary">English</button>
      <button type="button" id="btnAR">Arabic</button>
    </div>

    <!-- English (avatar LEFT by grid columns) -->
    <div id="sigEN" class="sig">
      <div class="avatarwrap">
        <img id="avatarEN" class="avatar" style="display:none" alt="avatar">
        <div id="initialsEN" class="initials">AA</div>
      </div>

      <div class="textwrap">
        <div id="pnameEN" class="name">Your Name</div>
        <div id="ptitleEN" class="title">Your Title</div>
        <div id="plinksEN" class="links"></div>
      </div>
    </div>

    <!-- Arabic (DOM order swapped => avatar RIGHT always) -->
    <div id="sigAR" class="sig" style="display:none">
      <div class="textwrap">
        <div id="pnameAR" class="name">اسمك</div>
        <div id="ptitleAR" class="title">مسمى وظيفتك</div>
        <div id="plinksAR" class="links"></div>
      </div>

      <div class="avatarwrap">
        <img id="avatarAR" class="avatar" style="display:none" alt="avatar">
        <div id="initialsAR" class="initials">AA</div>
      </div>
    </div>

  </div>

</div>

<!-- ---------- Cropper Modal ---------- -->
<div class="cropModal" id="cropModal" aria-hidden="true">
  <div class="cropBox">
    <div class="cropTop">
      <h4>Crop avatar (square)</h4>
      <button type="button" onclick="closeCropper()">Close</button>
    </div>

    <div class="cropStage">
      <canvas id="cropCanvas" class="cropCanvas"></canvas>
    </div>

    <div class="cropTools">
      <label>Zoom</label>
      <input id="zoomRange" type="range" min="0" max="4" step="0.01" value="1">
      <label>Rotate</label>
      <input id="rotRange" type="range" min="-180" max="180" step="1" value="0">
      <label style="display:flex;gap:8px;align-items:center;">
        <input id="mirrorX" type="checkbox"> Mirror
      </label>
    </div>

    <div class="cropHint">
      Drag the image to reposition. Use mouse wheel / trackpad to zoom. Output is 256×256 (good for email copy + PNG).
    </div>

    <div class="cropBtns">
      <button type="button" onclick="resetCropper()">Reset</button>
      <button type="button" class="primary" onclick="applyCroppedAvatar()">Apply Crop</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const $ = id => document.getElementById(id);
let currentLang = "EN";

/* ---------- Language toggle ---------- */
function setLang(lang){
  currentLang = lang;
  $("sigEN").style.display = (lang === "EN") ? "grid" : "none";
  $("sigAR").style.display = (lang === "AR") ? "grid" : "none";
  $("btnEN").className = (lang === "EN") ? "primary" : "";
  $("btnAR").className = (lang === "AR") ? "primary" : "";
}
$("btnEN").addEventListener("click", () => setLang("EN"));
$("btnAR").addEventListener("click", () => setLang("AR"));
setLang("EN");

/* ---------- Helpers ---------- */
function initials(n){
  let p = (n || "").trim().split(" ");
  if(!p[0]) return "AA";
  return (p[0][0] + (p[1] ? p[1][0] : "")).toUpperCase();
}

function update(){
  const name  = $("name").value || "Your Name";
  const title = $("title").value || "Your Title";
  const email = $("email").value.trim();
  const phone = $("phone").value.trim();
  const web   = $("web").value.trim();

  // EN
  $("pnameEN").textContent = name || "Your Name";
  $("ptitleEN").textContent = title || "Your Title";
  $("initialsEN").textContent = initials(name || "AA");

  // AR
  $("pnameAR").textContent = name || "اسمك";
  $("ptitleAR").textContent = title || "مسمى وظيفتك";
  $("initialsAR").textContent = initials(name || "AA");

  const links = [];
  if(email) links.push(`<a>${email}</a>`);
  if(phone) links.push(`<a>${phone}</a>`);
  if(web)   links.push(`<a>${web}</a>`);

  $("plinksEN").innerHTML = links.join("<br>");
  $("plinksAR").innerHTML = links.join("<br>");
}

["name","title","phone","email","web"].forEach(id => {
  $(id).oninput = update
});
update();

/* ---------- Avatar apply/reset (BOTH) ---------- */
function applyAvatarToBoth(dataUrl){
  $("avatarEN").src = dataUrl;
  $("avatarEN").style.display = "block";
  $("initialsEN").style.display = "none";

  $("avatarAR").src = dataUrl;
  $("avatarAR").style.display = "block";
  $("initialsAR").style.display = "none";
}

function resetAvatar(){
  $("avatarEN").src = "";
  $("avatarEN").style.display = "none";
  $("initialsEN").style.display = "flex";

  $("avatarAR").src = "";
  $("avatarAR").style.display = "none";
  $("initialsAR").style.display = "flex";

  document.querySelectorAll('input[name="presetAvatar"]').forEach(r => r.checked = false);
}

/* ============================================================
   CROPPER (no external libs): square crop, drag + zoom + rotate
   ============================================================ */
const cropModal = $("cropModal");
const cropCanvas = $("cropCanvas");
const cctx = cropCanvas.getContext("2d");

let cropImg = new Image();
let cropState = {
  imgLoaded:false,
  scale:1,
  rotate:0,     // radians
  mirror:false,
  cx:0, cy:0,   // image center position in canvas coords
  dragging:false,
  lastX:0, lastY:0
};

// fixed output and view
const CROP_OUTPUT = 256;     // final avatar size (email friendly)
const VIEW_SIZE = 800;       // internal canvas pixel size for crisp dragging

function openCropper(dataUrl){
  cropModal.style.display = "flex";
  cropModal.setAttribute("aria-hidden","false");

  // size the canvas for crispness (independent from CSS size)
  cropCanvas.width = VIEW_SIZE;
  cropCanvas.height = VIEW_SIZE;

  cropImg = new Image();
  cropImg.onload = () => {
    cropState.imgLoaded = true;

    // start centered
    cropState.scale = 1;
    cropState.rotate = 0;
    cropState.mirror = false;

    cropState.cx = cropCanvas.width/2;
    cropState.cy = cropCanvas.height/2;

    // fit image so it covers the crop square initially
    const minSide = Math.min(cropImg.width, cropImg.height);
    const coverScale = CROP_OUTPUT / minSide; // base cover at output size
    // Because our view canvas is bigger, scale up to match view
    const viewCover = (VIEW_SIZE / CROP_OUTPUT) * coverScale;
    cropState.scale = viewCover;

    $("zoomRange").value = Math.min(4, Math.max(1, cropState.scale));
    $("rotRange").value = 0;
    $("mirrorX").checked = false;

    drawCropper();
  };
  cropImg.src = dataUrl;
}

function closeCropper(){
  cropModal.style.display = "none";
  cropModal.setAttribute("aria-hidden","true");
  cropState.dragging = false;
}

function resetCropper(){
  if(!cropState.imgLoaded) return;
  cropState.cx = cropCanvas.width/2;
  cropState.cy = cropCanvas.height/2;
  cropState.rotate = 0;
  cropState.mirror = false;

  const minSide = Math.min(cropImg.width, cropImg.height);
  const coverScale = CROP_OUTPUT / minSide;
  cropState.scale = (VIEW_SIZE / CROP_OUTPUT) * coverScale;

  $("zoomRange").value = Math.min(4, Math.max(1, cropState.scale));
  $("rotRange").value = 0;
  $("mirrorX").checked = false;

  drawCropper();
}

function drawCropper(){
  const w = cropCanvas.width, h = cropCanvas.height;
  cctx.clearRect(0,0,w,h);

  // background
  cctx.fillStyle = "#f5f5f5";
  cctx.fillRect(0,0,w,h);

  if(!cropState.imgLoaded) return;

  // draw image with transforms
  cctx.save();
  cctx.translate(cropState.cx, cropState.cy);
  cctx.rotate(cropState.rotate);
  cctx.scale(cropState.mirror ? -cropState.scale : cropState.scale, cropState.scale);
  cctx.imageSmoothingEnabled = true;
  cctx.imageSmoothingQuality = "high";
  cctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  cctx.restore();

  // overlay + square crop window (center)
  const cropSize = CROP_OUTPUT * (VIEW_SIZE / CROP_OUTPUT); // equals VIEW_SIZE? no, we want actual crop window size in view:
  const windowSize = Math.min(w,h) * 0.62; // nice UI window
  const x = (w-windowSize)/2;
  const y = (h-windowSize)/2;

  // dark overlay
  cctx.save();
  cctx.fillStyle = "rgba(0,0,0,0.45)";
  cctx.fillRect(0,0,w,h);

  // cut the hole
  cctx.globalCompositeOperation = "destination-out";
  cctx.fillRect(x,y,windowSize,windowSize);
  cctx.restore();

  // border
  cctx.save();
  cctx.strokeStyle = "#ffffff";
  cctx.lineWidth = 2;
  cctx.strokeRect(x+1,y+1,windowSize-2,windowSize-2);
  cctx.restore();

  // guide text (optional)
  // cctx.fillStyle="#fff"; cctx.font="14px Arial"; cctx.fillText("Drag to position", x, y-10);

  // store window rect for extraction
  cropState.window = {x,y,size:windowSize};
}

/* drag controls */
cropCanvas.addEventListener("mousedown", (e)=>{
  if(!cropState.imgLoaded) return;
  cropState.dragging = true;
  cropState.lastX = e.offsetX;
  cropState.lastY = e.offsetY;
});
window.addEventListener("mouseup", ()=> cropState.dragging = false);
cropCanvas.addEventListener("mousemove", (e)=>{
  if(!cropState.dragging) return;
  const dx = e.offsetX - cropState.lastX;
  const dy = e.offsetY - cropState.lastY;
  cropState.lastX = e.offsetX;
  cropState.lastY = e.offsetY;
  cropState.cx += dx;
  cropState.cy += dy;
  drawCropper();
});

/* zoom wheel */
cropCanvas.addEventListener("wheel", (e)=>{
  if(!cropState.imgLoaded) return;
  e.preventDefault();
  const delta = Math.sign(e.deltaY);
  const factor = (delta > 0) ? 0.96 : 1.04;
  cropState.scale = Math.min(4, Math.max(0.4, cropState.scale * factor));
  $("zoomRange").value = cropState.scale;
  drawCropper();
}, {passive:false});

/* sliders */
$("zoomRange").addEventListener("input", (e)=>{
  cropState.scale = parseFloat(e.target.value);
  drawCropper();
});
$("rotRange").addEventListener("input", (e)=>{
  const deg = parseFloat(e.target.value);
  cropState.rotate = deg * Math.PI / 180;
  drawCropper();
});
$("mirrorX").addEventListener("change", (e)=>{
  cropState.mirror = e.target.checked;
  drawCropper();
});

/* extract cropped square to 256x256 dataURL */
function applyCroppedAvatar(){
  if(!cropState.imgLoaded) return;

  // create output canvas
  const out = document.createElement("canvas");
  out.width = CROP_OUTPUT;
  out.height = CROP_OUTPUT;
  const octx = out.getContext("2d");

  // compute mapping: take crop window from view canvas and scale into output
  const {x,y,size} = cropState.window;

  // First, render current view to an offscreen canvas (exactly as cropCanvas drawn, but without overlay)
  const raw = document.createElement("canvas");
  raw.width = cropCanvas.width;
  raw.height = cropCanvas.height;
  const rctx = raw.getContext("2d");

  // draw background (optional white)
  rctx.fillStyle = "#ffffff";
  rctx.fillRect(0,0,raw.width,raw.height);

  // draw transformed image
  rctx.save();
  rctx.translate(cropState.cx, cropState.cy);
  rctx.rotate(cropState.rotate);
  rctx.scale(cropState.mirror ? -cropState.scale : cropState.scale, cropState.scale);
  rctx.imageSmoothingEnabled = true;
  rctx.imageSmoothingQuality = "high";
  rctx.drawImage(cropImg, -cropImg.width/2, -cropImg.height/2);
  rctx.restore();

  // copy the crop window area into output canvas
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = "high";
  octx.drawImage(raw, x, y, size, size, 0, 0, CROP_OUTPUT, CROP_OUTPUT);

  const dataUrl = out.toDataURL("image/jpeg", 0.9);
  applyAvatarToBoth(dataUrl);

  // upload overrides preset selection
  document.querySelectorAll('input[name="presetAvatar"]').forEach(r => r.checked = false);

  closeCropper();
}

/* ---------- Upload avatar => open cropper ---------- */
$("avatarUpload").onchange = e => {
  let file = e.target.files && e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    openCropper(ev.target.result);
  };
  reader.readAsDataURL(file);

  // allow re-upload same file triggers again
  e.target.value = "";
};

/* ---------- Copy TEXT ---------- */
function copyText(){
  let t = [
    $("name").value, $("title").value, $("phone").value, $("email").value, $("web").value
  ].filter(Boolean).join(" | ");
  navigator.clipboard.writeText(t);
  alert("Text copied");
}

/* ---------- PNG export (selected language) ---------- */
async function downloadPNG(){
  try{
    if (document.fonts) await document.fonts.ready;

    const node = (currentLang === "AR") ? $("sigAR") : $("sigEN");
    const rect = node.getBoundingClientRect();

    const av = (currentLang === "AR") ? $("avatarAR") : $("avatarEN");
    if (av && av.style.display !== "none" && av.src){
      try { await av.decode(); } catch {}
    }

    const targetWidth = 3840;
    let scale = targetWidth / rect.width;
    scale = Math.min(scale, 6);

    const canvas = await html2canvas(node, {
      backgroundColor:"#ffffff",
      scale: scale,
      useCORS: true,
      allowTaint: true
    });

    const data = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = data;
    a.download = `signature-${currentLang.toLowerCase()}-4k.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();

  } catch(err){
    console.error("PNG export failed:", err);
    alert("PNG export failed. Check Console for details.");
  }
}

/* ---------- Email-safe builders (Calibri 12pt) ---------- */
function buildEmailSafeSignatureHTML_EN(){ return buildEmailSafeCore(false); }
function buildEmailSafeSignatureHTML_AR(){ return buildEmailSafeCore(true); }

function buildEmailSafeCore(isAR){
  const name  = ($("name").value  || (isAR ? "اسمك" : "Your Name")).trim();
  const title = ($("title").value || (isAR ? "مسمى وظيفتك" : "Your Title")).trim();
  const email = ($("email").value || "").trim();
  const phone = ($("phone").value || "").trim();
  const web   = ($("web").value   || "").trim();

  const avatarEl = isAR ? $("avatarAR") : $("avatarEN");
  const avatarSrc = (avatarEl.style.display !== "none" && avatarEl.src) ? avatarEl.src : "";
  const initialsText = initials(name || "AA");

  const FONT_FAMILY = "Calibri, Arial, sans-serif";
  const BASE_SIZE   = "12pt";
  const LINE_HEIGHT = "16pt";
  const COLOR  = "#02326d";
  const BORDER = `1px solid ${COLOR}`;
  const RADIUS = "6px";

  const esc = (s) => (s || "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#39;");

  const safeUrl = (u) => !u ? "" : (/^https?:\/\//i.test(u) ? u : "https://" + u);

  const contactRow = (html) => `
    <tr>
      <td style="padding:0;margin:0;font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};
                 color:${COLOR};text-align:${isAR ? "right" : "left"};direction:${isAR ? "rtl" : "ltr"};">
        ${html}
      </td>
    </tr>`.trim();

  const contacts = [];
  if(email) contacts.push(contactRow(`<a href="mailto:${esc(email)}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(email)}</a>`));
  if(phone) contacts.push(contactRow(`<a href="tel:${esc(phone.replace(/\s+/g,""))}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(phone)}</a>`));
  if(web)   contacts.push(contactRow(`<a href="${esc(safeUrl(web))}" style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};text-decoration:none;">${esc(web)}</a>`));

  const avatarBlock = avatarSrc
    ? `<img src="${esc(avatarSrc)}" width="150" height="150" alt="avatar"
         style="display:block;width:150px;height:150px;border-radius:${RADIUS};object-fit:cover;border:0;outline:none;text-decoration:none;">`
    : `<div style="width:150px;height:150px;border-radius:${RADIUS};background:${COLOR};color:#ffffff;
                  font-family:${FONT_FAMILY};font-size:20pt;line-height:150px;text-align:center;font-weight:700;">
         ${esc(initialsText)}
       </div>`;

  const SPACER_PX = 24;

  const textCell = `
<td valign="top" style="padding:0;margin:0;font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};
                       color:${COLOR};text-align:${isAR ? "right" : "left"};direction:${isAR ? "rtl" : "ltr"};">
  <div style="font-family:${FONT_FAMILY};font-size:14pt;line-height:18pt;font-weight:700;color:${COLOR};">${esc(name)}</div>
  <div style="font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};font-weight:400;color:${COLOR};">${esc(title)}</div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
    <tr><td style="height:${SPACER_PX}px;line-height:${SPACER_PX}px;font-size:0;">&nbsp;</td></tr>
  </table>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
    ${contacts.join("")}
  </table>
</td>`.trim();

  const avatarCell = `<td valign="top" style="padding:0;margin:0;" align="right">${avatarBlock}</td>`;
  const gapCell = `<td width="14" style="width:14px;font-size:0;line-height:0;">&nbsp;</td>`;

  const innerRow = isAR
    ? `${textCell}${gapCell}${avatarCell}`   // AR: avatar right
    : `${avatarCell}${gapCell}${textCell}`;  // EN: avatar left

  const FRAME_W = 600;
  const PAD = 6;
  const INNER_W = FRAME_W - (PAD*2);

  return `
<table dir="ltr" role="presentation" cellpadding="0" cellspacing="0" border="0" width="${FRAME_W}"
  style="width:${FRAME_W}px;max-width:${FRAME_W}px;direction:ltr;border-collapse:separate;border-spacing:0;
         border:${BORDER};border-radius:${RADIUS};
         font-family:${FONT_FAMILY};font-size:${BASE_SIZE};line-height:${LINE_HEIGHT};color:${COLOR};">
  <tr>
    <td style="padding:${PAD}px;width:${FRAME_W}px;max-width:${FRAME_W}px;">
      <table dir="ltr" role="presentation" cellpadding="0" cellspacing="0" border="0" width="${INNER_W}"
        style="width:${INNER_W}px;max-width:${INNER_W}px;direction:ltr;border-collapse:collapse;">
        <tr>
          ${innerRow}
        </tr>
      </table>
    </td>
  </tr>
</table>`.trim();
}

async function copyHTML(){
  const html = (currentLang === "AR")
    ? buildEmailSafeSignatureHTML_AR()
    : buildEmailSafeSignatureHTML_EN();

  const plain = [
    $("name").value, $("title").value, $("email").value, $("phone").value, $("web").value
  ].filter(Boolean).join(" | ") || "Signature";

  await navigator.clipboard.write([
    new ClipboardItem({
      "text/html": new Blob([html], { type: "text/html" }),
      "text/plain": new Blob([plain], { type: "text/plain" })
    })
  ]);

  alert(`Copied (${currentLang === "AR" ? "Arabic" : "English"} — Calibri 12pt email-safe).`);
}

/* ---------- Default avatars (radio presets) ---------- */
const DEFAULT_AVATARS = [
  "./images/darkemb.png",
  "./images/darkfull.png",
  "./images/lightemb.png",
  "./images/lightfull.png"
];

async function urlToDataURL(url){
  const res = await fetch(url, { cache: "no-store" });
  const blob = await res.blob();
  return await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}

async function initDefaultAvatars(){
  const wrap = $("avatarChoices");
  wrap.innerHTML = "";

  const dataUrls = await Promise.all(DEFAULT_AVATARS.map(urlToDataURL));

  dataUrls.forEach((dataUrl, idx) => {
    const id = `preset_${idx}`;

    const label = document.createElement("label");
    label.className = "avatar-choice";
    label.setAttribute("for", id);

    label.innerHTML = `
      <input type="radio" name="presetAvatar" id="${id}">
      <img class="avatar-thumb" src="${dataUrl}" alt="avatar ${idx+1}">
      <span>Avatar ${idx+1}</span>
    `;

    label.querySelector("input").addEventListener("change", () => {
      applyAvatarToBoth(dataUrl);
    });

    wrap.appendChild(label);
  });
}

initDefaultAvatars().catch(console.error);
</script>
